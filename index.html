<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloadable Resources - Arcknowledge</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid #ddd;
        }
        .logo {
            max-height: 90px;
        }
        h1 {
            margin: 15px 0 8px 0;
            font-size: 28px;
        }
        .resource {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0;
            border-bottom: 1px solid #eee;
        }
        .file-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .download-btn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .download-btn:hover {
            background-color: #0056b3;
        }
        footer {
            background-color: #f8f8f8;
            padding: 40px 0;
            margin-top: 60px;
            border-top: 1px solid #ddd;
            font-size: 14px;
        }
        .footer-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .legal-links {
            display: flex;
            gap: 25px;
            margin: 20px 0;
        }
        .legal-links a {
            color: #0066cc;
            text-decoration: underline;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 1000;
        }
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            width: 80%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 8px;
        }
        .close {
            float: right;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Header -->
        <header>
            <img src="arc.png" alt="Arcknowledge Logo" class="logo">
            <h1>Downloadable Resources</h1>
            <p>Professional business documents and guides</p>
        </header>

        <!-- Resources List -->
        <div id="resources-list"></div>

    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <p><strong>Arcknowledge Resources</strong></p>
            <p>Providing essential business documents for South African entrepreneurs.</p>
            
            <div class="legal-links">
                <a onclick="showModal('privacy')">Privacy Policy</a>
                <a onclick="showModal('terms')">Terms of Use</a>
                <a onclick="showModal('conditions')">Terms & Conditions</a>
            </div>
            
            <p>&copy; 2026 Arcknowledge. All rights reserved.</p>
        </div>
    </footer>

    <!-- Modals -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title"></h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <script>
        // GitHub Raw URL
        const GITHUB_RAW_URL = "https://raw.githubusercontent.com/kgolaganopoosa/arcknowledge/main/bizportal-company-registration-guide.pdf";

        // Resources Data
        let resources = [
            {
                id: 1,
                name: "BizPortal Company Registration Guide",
                filename: "bizportal-company-registration-guide.pdf",
                size: "159.54 KB",
                downloadUrl: GITHUB_RAW_URL
            }
        ];

        // Render Resources
        function renderResources() {
            const container = document.getElementById('resources-list');
            container.innerHTML = '';

            resources.forEach(resource => {
                const div = document.createElement('div');
                div.className = 'resource';
                div.innerHTML = `
                    <div class="file-info">
                        <strong>📄</strong>
                        <div>
                            <div style="font-size: 18px; font-weight: bold;">${resource.name}</div>
                            <div style="font-size: 14px; color: #666; margin-top: 4px;">
                                Size: ${resource.size}
                            </div>
                        </div>
                    </div>
                    <button class="download-btn" onclick="handleDownload(${resource.id})">Download</button>
                `;
                container.appendChild(div);
            });
        }

        // Handle Direct Download from GitHub
        function handleDownload(id) {
            const resource = resources.find(r => r.id === id);
            if (!resource || !resource.downloadUrl) {
                alert("Download link is not available.");
                return;
            }

            // Trigger download
            const link = document.createElement('a');
            link.href = resource.downloadUrl;
            link.download = resource.filename;
            link.target = "_blank";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Show Modal
        function showModal(type) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');

            if (type === 'privacy') {
                title.textContent = 'Privacy Policy';
                body.innerHTML = `
                    <p><strong>Last updated: May 28, 2026</strong></p>
                    <p>We respect your privacy. This website does not collect personal information unless voluntarily provided.</p>
                    <p>We do not sell, share, or distribute your data to third parties.</p>
                `;
            } 
            else if (type === 'terms') {
                title.textContent = 'Terms of Use';
                body.innerHTML = `
                    <p>By accessing and using this website, you agree to the following terms:</p>
                    <ul>
                        <li>The documents are provided for personal and legitimate business use only.</li>
                        <li>You may not resell, redistribute, or commercially exploit the downloaded files.</li>
                        <li>All content is provided on an "as is" basis without any warranties.</li>
                    </ul>
                `;
            } 
            else if (type === 'conditions') {
                title.textContent = 'Terms & Conditions';
                body.innerHTML = `
                    <p><strong>Governing Law:</strong> These terms shall be governed by the laws of the Republic of South Africa.</p>
                    <p><strong>Limitation of Liability:</strong> Arcknowledge shall not be liable for any direct or indirect damages arising from the use of these documents.</p>
                    <p><strong>Intellectual Property:</strong> All materials are owned by Arcknowledge and protected by copyright law.</p>
                    <p><strong>Usage Rights:</strong> You are granted a limited, non-exclusive, non-transferable license to download and use the documents for your own business purposes.</p>
                `;
            }

            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Initialize
        window.onload = function() {
            renderResources();
        };

        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        };
    </script>

</body>
</html>
